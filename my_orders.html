<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders - Aesthera Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand brand-font" href="index.html" style="font-size: 1.5rem;">Aesthera</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
        <li class="nav-item"><a class="nav-link active" href="my_orders.html">Orders</a></li>
      </ul>
      <ul class="navbar-nav" id="authNav"></ul>
    </div>
  </div>
</nav>

<div class="container main-content mt-5 mb-5 px-3">
    <div class="mt-4 mb-4">
        <h2 class="brand-font">My Orders</h2>
        <p class="text-muted">Track the status of your painting orders.</p>
    </div>

    <div class="card painting-card">
        <div class="card-body p-0">
            <div class="table-responsive" id="ordersContainer">
               <!-- Populated by JS --> 
            </div>
        </div>
    </div>
</div>

<script src="assets/js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if(!user || user.role !== 'customer') {
            window.location.href = 'login.html';
            return;
        }

        const allOrders = getOrders();
        const userOrders = allOrders.filter(o => o.customer_id === user.id).reverse();
        const container = document.getElementById('ordersContainer');

        if (userOrders.length === 0) {
            container.innerHTML = `
                <div class="p-5 text-center">
                    <h4 class="text-muted mb-3">You haven't placed any orders yet.</h4>
                    <a href="index.html" class="btn btn-primary">Browse Gallery</a>
                </div>
            `;
            return;
        }

        let html = `
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4 py-3">Painting</th>
                        <th>Details</th>
                        <th>Price</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
        `;

        userOrders.forEach(order => {
            const painting = getPaintingById(order.painting_id);
            if (!painting) return;

            const badge = order.status === 'Pending' 
                ? '<span class="badge bg-warning text-dark">Pending</span>'
                : '<span class="badge bg-success">Completed</span>';

            html += `
                <tr>
                    <td class="ps-4 py-3">
                        <img src="${painting.image_url}" alt="${painting.title}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 8px;">
                    </td>
                    <td>
                        <h6 class="mb-1 brand-font">${painting.title}</h6>
                        <small class="text-muted">Order #${order.id}</small>
                    </td>
                    <td>$${parseFloat(painting.price).toLocaleString('en-US', {minimumFractionDigits: 2})}</td>
                    <td>${badge}</td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    });
</script>
</body>
</html>
