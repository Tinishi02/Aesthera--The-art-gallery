<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Aesthera Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
  <div class="container">
    <a class="navbar-brand brand-font" href="index.html" style="font-size: 1.5rem;">Aesthera</a>
    <ul class="navbar-nav me-auto">
      <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
      <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
    </ul>
    <ul class="navbar-nav" id="authNav"></ul>
  </div>
</nav>

<div class="container main-content mt-5 mb-5 px-3">
    <div class="d-flex justify-content-between align-items-center mb-4 mt-4">
        <h2 class="brand-font">Admin Dashboard - Orders</h2>
        <!-- Features mock only -->
        <button class="btn btn-outline-primary shadow-sm" onclick="alert('Manage paintings feature is demoed via code modification in HTML version.')">Manage Paintings</button>
    </div>

    <div class="card painting-card">
        <div class="card-body">
            <div class="table-responsive" id="adminOrdersContainer">
                <!-- Populated by JS -->
            </div>
        </div>
    </div>
</div>

<script src="assets/js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const user = getCurrentUser();
        if(!user || user.role !== 'admin') {
            window.location.href = 'login.html';
            return;
        }

        renderAdminOrders();
    });

    function renderAdminOrders() {
        const allOrders = getOrders().reverse();
        const users = getUsers();
        const container = document.getElementById('adminOrdersContainer');

        if (allOrders.length === 0) {
            container.innerHTML = `<p class="text-muted mb-0">No orders found.</p>`;
            return;
        }

        let html = `
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Painting Title</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
        `;

        allOrders.forEach(order => {
            const painting = getPaintingById(order.painting_id);
            const customer = users.find(u => u.id === order.customer_id);
            if (!painting || !customer) return;

            const badge = order.status === 'Pending' 
                ? '<span class="badge bg-warning text-dark">Pending</span>'
                : '<span class="badge bg-success">Completed</span>';

            const actionBtn = order.status === 'Pending'
                ? `<button onclick="markCompleted(${order.id})" class="btn btn-sm btn-success">Mark Completed</button>`
                : ``;

            html += `
                <tr>
                    <td>#${order.id}</td>
                    <td>${customer.name}</td>
                    <td>${painting.title}</td>
                    <td>${badge}</td>
                    <td>${actionBtn}</td>
                </tr>
            `;
        });

        html += `</tbody></table>`;
        container.innerHTML = html;
    }

    function markCompleted(orderId) {
        const orders = getOrders();
        const orderIndex = orders.findIndex(o => o.id === orderId);
        if (orderIndex > -1) {
            orders[orderIndex].status = 'Completed';
            localStorage.setItem('orders', JSON.stringify(orders));
            renderAdminOrders();
        }
    }
</script>
</body>
</html>
