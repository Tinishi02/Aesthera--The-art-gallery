<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Aesthera Gallery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
        <a class="navbar-brand" href="index.html" style="font-family: 'Playfair Display', serif; font-size: 1.5rem;">Aesthera</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                <li class="nav-item"><a class="nav-link" href="my_orders.html">Orders</a></li>
            </ul>
            <ul class="navbar-nav" id="authNav">
                <!-- JS will populate auth links based on login state -->
            </ul>
        </div>
    </div>
</nav>

<div class="container main-content mt-5 mb-5 px-3">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card painting-card mt-5 border-0 shadow-sm" style="border-radius: 12px;">
                <div class="card-body p-4 p-md-5">
                    <h2 class="text-center mb-4 brand-font" style="color: var(--primary-color);">Login</h2>
                    
                    <div id="errorMsg" class="alert alert-danger d-none"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label text-muted">Email address</label>
                            <input type="email" class="form-control py-2" id="email" required>
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label text-muted">Password</label>
                            <input type="password" class="form-control py-2" id="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 mb-3 brand-font">Login</button>
                        <div class="text-center mt-3">
                            <p class="mb-0 text-muted">Need an account? <a href="register.html" class="text-secondary fw-semibold">Register here</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-4 mt-auto">
    <div class="container">
        <p class="mb-0" style="font-family: 'Playfair Display', serif;">&copy; <span id="year"></span> Aesthera Art Gallery. All Rights Reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/main.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if(getCurrentUser()) window.location.href = 'index.html';

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (loginUser(email, password)) {
                const user = getCurrentUser();
                window.location.href = user.role === 'admin' ? 'admin_dashboard.html' : 'index.html';
            } else {
                const err = document.getElementById('errorMsg');
                err.textContent = "Invalid email or password!";
                err.classList.remove('d-none');
            }
        });
    });
</script>
</body>
</html>
