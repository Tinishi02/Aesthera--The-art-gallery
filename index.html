<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthera Art Gallery</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"
                style="font-family: 'Playfair Display', serif; font-size: 1.5rem;">Aesthera</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li>
                    <li class="nav-item"><a class="nav-link" href="my_orders.html">Orders</a></li>
                </ul>
                <ul class="navbar-nav" id="authNav">
                    <!-- JS will populate auth links based on login state -->
                </ul>
            </div>
        </div>
    </nav>

    <div class="container main-content mt-5 mb-5 px-3">
        <div class="hero-section mb-5">
            <h1 class="brand-font">Discover Masterpieces</h1>
            <p class="lead mb-4">Browse our curated collection of extraordinary paintings for your space.</p>
            <a href="gallery.html" class="btn btn-accent btn-lg px-5 py-3 rounded-pill shadow-sm fw-bold">View Gallery</a>
        </div>

        <!-- Gallery Grid -->
        <div class="row row-cols-1 row-cols-md-3 g-4">
            <div class="col">
                <div class="card painting-card h-100 border-0 shadow-sm" style="overflow: hidden; border-radius: 12px;">
                    <a href="gallery.html">
                        <img src="https://images.unsplash.com/photo-1579783902614-a3fb3927b6a5?auto=format&fit=crop&q=80&w=800" class="card-img-top w-100" style="height: 350px; object-fit: cover; transition: transform 0.3s;" alt="Starry Night Replica" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    </a>
                </div>
            </div>
            <div class="col">
                <div class="card painting-card h-100 border-0 shadow-sm" style="overflow: hidden; border-radius: 12px;">
                    <a href="gallery.html">
                        <img src="https://images.unsplash.com/photo-1541961017774-22349e4a1262?auto=format&fit=crop&q=80&w=800" class="card-img-top w-100" style="height: 350px; object-fit: cover; transition: transform 0.3s;" alt="Abstract Waves" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    </a>
                </div>
            </div>
            <div class="col">
                <div class="card painting-card h-100 border-0 shadow-sm" style="overflow: hidden; border-radius: 12px;">
                    <a href="gallery.html">
                        <img src="https://images.unsplash.com/photo-1578301978018-3005759f48f7?auto=format&fit=crop&q=80&w=800" class="card-img-top w-100" style="height: 350px; object-fit: cover; transition: transform 0.3s;" alt="Mountain View" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-0" style="font-family: 'Playfair Display', serif;">&copy; <span id="year"></span> Aesthera Art
                Gallery. All Rights Reserved.</p>
        </div>
    </footer>

    <!-- JS Logic and Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <!-- Images are hardcoded; dynamic script removed -->
</body>

</html>
